spring.application.name=travel-api

server.port=8080

# DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travel_agency}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# REDIS
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}
spring.data.redis.repositories.enabled=false
rag.chat.redis.ttl-hours=${RAG_CHAT_REDIS_TTL_HOURS:24}
rag.service.url=${RAG_SERVICE_URL:http://agent:3000}
rag.api.key=${RAG_API_KEY:}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

spring.jpa.properties.hibernate.format_sql=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.baseline-version=${SPRING_FLYWAY_BASELINE_VERSION:1}
spring.flyway.locations=classpath:db/migration

spring.jpa.open-in-view=false

# ACTUATOR
management.endpoints.web.exposure.include=health,info
