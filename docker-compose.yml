services:
  postgres:
    image: postgres:16-alpine
    container_name: travel_agency_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travel_agency_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_agency_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 2s
      RAG_CHAT_REDIS_TTL_HOURS: 24
      RAG_SERVICE_URL: http://agent:3000
      RAG_API_KEY: ${RAG_API_KEY}
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
    ports:
      - "${SERVER_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: travel_agency_agent
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      RAG_API_KEY: ${RAG_API_KEY}
      BACKEND_URL: http://backend:8080
      PORT: 3000
      CORS_ORIGINS: "*"
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 50
      CHROMA_COLLECTION: knowledge-base
    ports:
      - "3002:3000"
    volumes:
      - agent_chroma_data:/app/chromadb
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_agency_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      INTERNAL_API_URL: http://backend:8080
      PUBLIC_API_URL: http://localhost:${SERVER_PORT}
      PUBLIC_WHATSAPP_NUMBER: ${PUBLIC_WHATSAPP_NUMBER}
      ADMIN_DASHBOARD_PASSWORD: ${ADMIN_DASHBOARD_PASSWORD}
      HOST: 0.0.0.0
      PORT: 4321
    ports:
      - "${FRONTEND_PORT}:4321"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4321/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  n8n-workflow-import:
    image: n8nio/n8n:latest
    container_name: travel_agency_n8n_import
    depends_on:
      n8n:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n/workflows:/workflows:ro
    command: ["sh", "/workflows/import.sh"]

  n8n:
    image: n8nio/n8n:latest
    container_name: travel_agency_n8n
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      agent:
        condition: service_healthy
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=America/Mexico_City
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_URL=http://backend:8080
      - AGENT_URL=http://agent:3000
      - RAG_API_KEY=${RAG_API_KEY}
    ports:
      - "${N8N_PORT}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n/workflows:/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer:4
    container_name: travel_agency_adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT}:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: travel_agency_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:2.9.8
    container_name: travel_agency_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./infra/observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  grafana:
    image: grafana/grafana:11.2.0
    container_name: travel_agency_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: travel_agency_uptime_kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    volumes:
      - uptime_kuma_data:/app/data

volumes:
  postgres_data:
  redis_data:
  agent_chroma_data:
  n8n_data:
  prometheus_data:
  loki_data:
  grafana_data:
  uptime_kuma_data:
